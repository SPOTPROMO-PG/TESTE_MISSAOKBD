<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Missão KBD</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="app.js"></script>
</head>
<body onload="renderLogin()">
  <div class="login-page">
    <div class="login-wrap">
      <div class="login-stage">
        <div class="login-hero">
          <div class="rocket" id="loginRocket"></div>
          <div class="topbar-title" style="font-size:30px">MISSÃO KBD</div>
        </div>
        <div class="login-card">
          <div class="eyebrow">Login do setor</div>
          <h1 class="hero-title" style="margin-top:14px">Acesse sua missão</h1>
          <p class="hero-copy" style="margin-top:14px">Entre com o código do setor para abrir marcas, consultar KBDs e responder os quizzes do treinamento.</p>
          <div style="margin-top:22px">
            <div class="field-label">Código do setor</div>
            <div class="input-wrap">
              <input id="setor" type="text" placeholder="Ex: SPI200">
            </div>
          </div>
          <div class="login-actions">
            <button class="primary-btn pink" onclick="entrar()">Entrar</button>
            <div class="linkish">setores liberados</div>
            <div class="subtle" id="loginSectorList" style="text-align:center"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
